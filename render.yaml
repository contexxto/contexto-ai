services:
  - type: web
    name: contexto-ai-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter          # $7/mes — no duerme (free tier sí duerme)
    region: oregon
    healthCheckPath: /health
    envVars:
      # DATABASE_URL_OVERRIDE tiene precedencia sobre los parámetros individuales.
      # Usar Session Pooler de Supabase para IPv4 (puerto 5432, host aws-0-us-west-2).
      # Formato: postgresql+asyncpg://postgres.PROJECTID:[PASSWORD]@aws-0-us-west-2.pooler.supabase.com:5432/postgres
      - key: DATABASE_URL_OVERRIDE
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_MODEL
        value: claude-sonnet-4-5-20250929
      - key: SSL_VERIFY
        value: "true"
      # Isócronas peatonales — motor propio Valhalla (private service de abajo).
      # NO es un valor fijo: los private services de Render creados a mano (no por
      # sync de Blueprint) reciben una dirección interna con sufijo aleatorio
      # (ej. "valhalla-ncj7:8002", NO "valhalla:8002"). Copia la dirección REAL
      # desde el dashboard → servicio 'valhalla' → "Service Address", y ponla aquí
      # como http://<esa-direccion>. No es secreto (red privada), pero varía por
      # despliegue → sync:false para que cada quien la configure con su valor real.
      - key: VALHALLA_URL
        sync: false
      # Fallback si no se usa DATABASE_URL_OVERRIDE
      - key: POSTGRES_HOST
        value: "db.jzxeigzxgbglfsiiqpxv.supabase.co"
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_DB
        value: "postgres"
      - key: POSTGRES_USER
        value: "postgres"
      - key: POSTGRES_PASSWORD
        sync: false

  # ── Valhalla: motor de isócronas peatonales (Ladrillo #7 del foso) ──
  # Private service (NO expuesto a internet); solo el web service lo alcanza por
  # la red interna, en la dirección que Render le asigne (ver "Service Address"
  # en el dashboard tras crearlo — copia ESA a VALHALLA_URL arriba). Imagen
  # prearmada valhalla-scripted: al primer arranque baja el PBF de Ecuador y
  # construye los tiles (~5-15 min, necesita ~2-4 GB RAM → plan standard); el
  # disco persistente los conserva, así que reinicios y deploys posteriores NO
  # reconstruyen (use_tiles_ignore_pbf). PORT=8002 es OBLIGATORIO: Render espera
  # 10000 por defecto, pero Valhalla escucha en 8002 — sin este env var el
  # servicio queda inalcanzable aunque el build termine bien.
  # Ver docs/DEPLOY_Valhalla.md y SPEC_Foso_Capa_de_Datos.md §2.
  - type: pserv
    name: valhalla
    runtime: image
    image:
      url: ghcr.io/valhalla/valhalla-scripted:latest
    plan: standard          # 2 GB RAM — necesario para el build de tiles
    region: oregon          # MISMA región que el web service (red interna)
    disk:
      name: valhalla-tiles
      mountPath: /custom_files
      sizeGB: 5
    envVars:
      - key: tile_urls
        value: "https://download.geofabrik.de/south-america/ecuador-latest.osm.pbf"
      - key: use_tiles_ignore_pbf
        value: "True"       # si ya hay tiles en el disco, NO reconstruye
      - key: build_admins
        value: "True"       # sin admin polygons, isócronas/ruteo degradan
      - key: build_time_zones
        value: "True"
      - key: build_elevation
        value: "False"      # peatonal urbano: sin elevación
      - key: server_threads
        value: "2"          # acota RAM del build (NO 'concurrency')
      - key: force_rebuild
        value: "False"
      - key: PORT
        value: "8002"    # OBLIGATORIO — Valhalla escucha en 8002, no en el 10000 default

<!doctype html>
<html lang="es"><head>
<meta charset="utf-8">
<title>Logo · Lockups</title>
<link rel="stylesheet" href="_base.css">
<style>
  .logo-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; }
  .logo-cell {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; padding:24px 16px; border-radius:var(--radius-lg);
    border:1px solid var(--border); min-height:140px;
  }
  .logo-cell-label { font-family:var(--font-mono); font-size:10px; color:var(--text-dim); letter-spacing:0.8px; text-transform:uppercase; }
  .wordmark {
    font-family: var(--font-display);
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
  }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">LOGO · VARIANTES Y LOCKUPS</p>
  <div class="logo-grid">

    <!-- Logomark on dark -->
    <div class="logo-cell" style="background:var(--bg);">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="56" height="56" rx="14" fill="url(#g1)"/>
        <path d="M28 14C22.48 14 18 18.36 18 23.7C18 31.08 28 42 28 42C28 42 38 31.08 38 23.7C38 18.36 33.52 14 28 14Z" fill="rgba(255,255,255,0.15)"/>
        <path d="M28 16C23.58 16 20 19.46 20 23.7C20 29.7 28 39 28 39C28 39 36 29.7 36 23.7C36 19.46 32.42 16 28 16Z" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="0.75"/>
        <circle cx="28" cy="23.5" r="4" fill="white"/>
        <circle cx="28" cy="23.5" r="2" fill="#41608C"/>
        <defs><linearGradient id="g1" x1="0" y1="0" x2="56" y2="56"><stop stop-color="#41608C"/><stop offset="1" stop-color="#5E80AC"/></linearGradient></defs>
      </svg>
      <span class="logo-cell-label">Logomark · dark</span>
    </div>

    <!-- Logomark on light -->
    <div class="logo-cell" style="background:#F8F9FB;">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="56" height="56" rx="14" fill="url(#g2)"/>
        <path d="M28 14C22.48 14 18 18.36 18 23.7C18 31.08 28 42 28 42C28 42 38 31.08 38 23.7C38 18.36 33.52 14 28 14Z" fill="rgba(255,255,255,0.15)"/>
        <path d="M28 16C23.58 16 20 19.46 20 23.7C20 29.7 28 39 28 39C28 39 36 29.7 36 23.7C36 19.46 32.42 16 28 16Z" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="0.75"/>
        <circle cx="28" cy="23.5" r="4" fill="white"/>
        <circle cx="28" cy="23.5" r="2" fill="#41608C"/>
        <defs><linearGradient id="g2" x1="0" y1="0" x2="56" y2="56"><stop stop-color="#41608C"/><stop offset="1" stop-color="#5E80AC"/></linearGradient></defs>
      </svg>
      <span class="logo-cell-label" style="color:#8A919E;">Logomark · light</span>
    </div>

    <!-- Monogram C -->
    <div class="logo-cell" style="background:var(--bg);">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="28" cy="28" r="27" fill="url(#g3)"/>
        <text x="28" y="36" text-anchor="middle" fill="white" font-family="Space Grotesk, system-ui" font-weight="700" font-size="28">C</text>
        <defs><linearGradient id="g3" x1="0" y1="0" x2="56" y2="56"><stop stop-color="#41608C"/><stop offset="1" stop-color="#5E80AC"/></linearGradient></defs>
      </svg>
      <span class="logo-cell-label">Monograma · C</span>
    </div>

    <!-- Lockup horizontal dark -->
    <div class="logo-cell" style="background:var(--bg); grid-column:1/3;">
      <div style="display:flex; align-items:center; gap:14px;">
        <svg width="40" height="40" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="56" height="56" rx="14" fill="url(#g4)"/>
          <path d="M28 16C23.58 16 20 19.46 20 23.7C20 29.7 28 39 28 39C28 39 36 29.7 36 23.7C36 19.46 32.42 16 28 16Z" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="0.75"/>
          <circle cx="28" cy="23.5" r="3.5" fill="white"/>
          <circle cx="28" cy="23.5" r="1.5" fill="#41608C"/>
          <defs><linearGradient id="g4" x1="0" y1="0" x2="56" y2="56"><stop stop-color="#41608C"/><stop offset="1" stop-color="#5E80AC"/></linearGradient></defs>
        </svg>
        <div style="display:flex; flex-direction:column; gap:2px;">
          <span class="wordmark" style="font-size:22px; color:var(--text);">Contexto AI</span>
          <span style="font-family:var(--font-mono); font-size:9px; color:var(--text-dim); letter-spacing:1.5px; text-transform:uppercase;">El Catastro Vivo</span>
        </div>
      </div>
      <span class="logo-cell-label">Lockup horizontal · dark</span>
    </div>

    <!-- Lockup on primary -->
    <div class="logo-cell" style="background:var(--primary);">
      <div style="display:flex; align-items:center; gap:12px;">
        <svg width="36" height="36" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="56" height="56" rx="14" fill="rgba(255,255,255,0.15)"/>
          <path d="M28 16C23.58 16 20 19.46 20 23.7C20 29.7 28 39 28 39C28 39 36 29.7 36 23.7C36 19.46 32.42 16 28 16Z" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.6)" stroke-width="0.75"/>
          <circle cx="28" cy="23.5" r="3.5" fill="white"/>
          <defs></defs>
        </svg>
        <span class="wordmark" style="font-size:20px; color:white;">Contexto AI</span>
      </div>
      <span class="logo-cell-label" style="color:rgba(255,255,255,0.5);">Mono white · sobre primario</span>
    </div>

    <!-- Lockup stacked -->
    <div class="logo-cell" style="background:var(--bg); grid-column:1/4;">
      <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
        <svg width="52" height="52" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="56" height="56" rx="14" fill="url(#g5)"/>
          <path d="M28 14C22.48 14 18 18.36 18 23.7C18 31.08 28 42 28 42C28 42 38 31.08 38 23.7C38 18.36 33.52 14 28 14Z" fill="rgba(255,255,255,0.15)"/>
          <path d="M28 16C23.58 16 20 19.46 20 23.7C20 29.7 28 39 28 39C28 39 36 29.7 36 23.7C36 19.46 32.42 16 28 16Z" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="0.75"/>
          <circle cx="28" cy="23.5" r="4" fill="white"/>
          <circle cx="28" cy="23.5" r="2" fill="#41608C"/>
          <defs><linearGradient id="g5" x1="0" y1="0" x2="56" y2="56"><stop stop-color="#41608C"/><stop offset="1" stop-color="#5E80AC"/></linearGradient></defs>
        </svg>
        <span class="wordmark" style="font-size:28px; color:var(--text);">Contexto AI</span>
        <span style="font-family:var(--font-mono); font-size:10px; color:var(--text-dim); letter-spacing:2px; text-transform:uppercase;">El Catastro Vivo de Latinoamérica</span>
      </div>
      <span class="logo-cell-label">Lockup stacked · dark</span>
    </div>
  </div>
</div>
</body></html>

<!doctype html>
<html lang="es"><head>
<meta charset="utf-8">
<title>Semánticos</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <p class="eyebrow">SEMÁNTICOS · SEÑALES DE ESTADO</p>
  <div class="row">
    <div class="swatch">
      <div class="chip" style="background:#6FB083"></div>
      <p class="name">Success</p>
      <span class="hex">#6FB083</span>
      <span class="role">PUBLICADO · OK</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#D29922"></div>
      <p class="name">Warning</p>
      <span class="hex">#D29922</span>
      <span class="role">REVISIÓN · DUDOSO</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#F85149"></div>
      <p class="name">Danger</p>
      <span class="hex">#F85149</span>
      <span class="role">RECHAZO · ERROR</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#8FB0D4"></div>
      <p class="name">Info</p>
      <span class="hex">#8FB0D4</span>
      <span class="role">INFORMATIVO · TIPS</span>
    </div>
  </div>
</div>
</body></html>

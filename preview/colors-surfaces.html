<!doctype html>
<html lang="es"><head>
<meta charset="utf-8">
<title>Superficies · Dark</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <p class="eyebrow">SUPERFICIES · DARK SYSTEM</p>
  <div class="row">
    <div class="swatch">
      <div class="chip" style="background:#1A1C20"></div>
      <p class="name">Background</p>
      <span class="hex">#1A1C20</span>
      <span class="role">CANVAS</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#23262B"></div>
      <p class="name">Surface 1</p>
      <span class="hex">#23262B</span>
      <span class="role">PANELS · APP BG</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#2A2E35"></div>
      <p class="name">Surface 2</p>
      <span class="hex">#2A2E35</span>
      <span class="role">CARDS · CONTAINERS</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#343841"></div>
      <p class="name">Border</p>
      <span class="hex">#343841</span>
      <span class="role">BORDES · DIVIDERS</span>
    </div>
  </div>
  <div class="row" style="margin-top:4px;">
    <div class="swatch">
      <div class="chip" style="background:#DDE2E8"></div>
      <p class="name">Texto</p>
      <span class="hex">#DDE2E8</span>
      <span class="role">TEXTO PRINCIPAL</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#969CA6"></div>
      <p class="name">Muted</p>
      <span class="hex">#969CA6</span>
      <span class="role">SECUNDARIO · META</span>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#6B7280"></div>
      <p class="name">Dim</p>
      <span class="hex">#6B7280</span>
      <span class="role">TERCIARIO · TIMESTAMPS</span>
    </div>
    <div class="swatch" style="opacity:0; pointer-events:none;">
      <div class="chip"></div>
    </div>
  </div>
</div>
</body></html>

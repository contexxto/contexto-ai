<!doctype html>
<html lang="es"><head>
<meta charset="utf-8">
<title>Mono · JetBrains Mono</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <p class="eyebrow">DATA · JETBRAINS MONO 400–500</p>
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="font-family:var(--font-mono); font-size:24px; font-weight:500; color:var(--accent); letter-spacing:0.5px; line-height:1.3;">
      -0.1892° S, -78.4783° W
    </div>
    <div style="display:flex; gap:16px; flex-wrap:wrap;">
      <span style="font-family:var(--font-mono); font-size:13px; padding:4px 10px; background:var(--surface-2); border-radius:var(--radius-sm); color:var(--success);">publicado</span>
      <span style="font-family:var(--font-mono); font-size:13px; padding:4px 10px; background:var(--surface-2); border-radius:var(--radius-sm); color:var(--warning);">en-revisión</span>
      <span style="font-family:var(--font-mono); font-size:13px; padding:4px 10px; background:var(--surface-2); border-radius:var(--radius-sm); color:var(--danger);">rechazado</span>
      <span style="font-family:var(--font-mono); font-size:13px; padding:4px 10px; background:var(--surface-2); border-radius:var(--radius-sm); color:var(--text-muted);">indeterminado</span>
    </div>
    <div style="font-family:var(--font-mono); font-size:13px; color:var(--text-dim); line-height:1.7;">
      ruido: 58 dB(A) · tráfico: 1240 veh/día · walk_score: 82<br>
      cobertura_vegetal: 34% · pisos: 4 · año: 2018
    </div>
    <div style="display:flex; gap:32px; align-items:baseline; margin-top:4px;">
      <span class="mono" style="color:var(--text-dim); font-size:11px;">PESO 400 · 500</span>
      <span class="mono" style="color:var(--text-dim); font-size:11px;">COORDENADAS · MÉTRICAS · TAGS</span>
    </div>
  </div>
</div>
</body></html>

<!doctype html>
<html lang="es"><head>
<meta charset="utf-8">
<title>Escala Tipográfica</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card" style="gap:10px;">
  <p class="eyebrow">ESCALA TIPOGRÁFICA</p>
  <div style="display:flex; flex-direction:column; gap:2px;">
    <div style="display:flex; align-items:baseline; gap:16px;">
      <span class="mono" style="font-size:10px; color:var(--text-dim); min-width:52px;">96px</span>
      <span style="font-family:var(--font-display); font-weight:700; font-size:64px; line-height:1; letter-spacing:-1px; color:var(--text);">Hero</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:16px;">
      <span class="mono" style="font-size:10px; color:var(--text-dim); min-width:52px;">48px</span>
      <span style="font-family:var(--font-display); font-weight:700; font-size:40px; line-height:1.1; letter-spacing:-0.5px; color:var(--text);">Display H1</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:16px;">
      <span class="mono" style="font-size:10px; color:var(--text-dim); min-width:52px;">32px</span>
      <span style="font-family:var(--font-display); font-weight:600; font-size:28px; line-height:1.2; color:var(--text);">Section H2</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:16px;">
      <span class="mono" style="font-size:10px; color:var(--text-dim); min-width:52px;">24px</span>
      <span style="font-family:var(--font-display); font-weight:600; font-size:22px; line-height:1.3; color:var(--text);">Subsection H3</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:16px;">
      <span class="mono" style="font-size:10px; color:var(--text-dim); min-width:52px;">18px</span>
      <span style="font-family:var(--font-body); font-weight:400; font-size:18px; line-height:1.5; color:var(--text);">Large body text — descripciones</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:16px;">
      <span class="mono" style="font-size:10px; color:var(--text-dim); min-width:52px;">16px</span>
      <span style="font-family:var(--font-body); font-weight:400; font-size:16px; line-height:1.5; color:var(--text-muted);">Body text — párrafos y UI</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:16px;">
      <span class="mono" style="font-size:10px; color:var(--text-dim); min-width:52px;">13px</span>
      <span style="font-family:var(--font-mono); font-weight:400; font-size:13px; line-height:1.5; color:var(--text-muted);">mono data — coordenadas, métricas</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:16px;">
      <span class="mono" style="font-size:10px; color:var(--text-dim); min-width:52px;">12px</span>
      <span style="font-family:var(--font-body); font-weight:500; font-size:12px; line-height:1.5; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Labels · Captions</span>
    </div>
  </div>
</div>
</body></html>

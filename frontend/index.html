<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/sphere-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1C1C1C" />

    <!-- PWA: instalable en el teléfono (ícono en inicio, abre en / → directo al agente) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Contexto" />
    <meta name="description" content="Contexto — Cada lugar tiene un aura. La IA inmobiliaria que verifica el entorno antes de recomendarlo. Inteligencia geoespacial inmobiliaria en Quito." />
    <title>Contexto · Cada lugar tiene un aura</title>

    <!-- Open Graph / compartir en redes (LinkedIn, WhatsApp, Slack…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Contexto" />
    <meta property="og:locale" content="es_EC" />
    <meta property="og:title" content="Contexto · Cada lugar tiene un aura" />
    <meta property="og:description" content="La IA inmobiliaria que verifica el entorno antes de recomendarlo: caminabilidad real, colegios, ruido y a cuántos minutos a pie está todo." />
    <meta property="og:url" content="https://contexxto.com/" />
    <meta property="og:image" content="https://contexxto.com/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Contexto — Cada lugar tiene un aura" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Contexto · Cada lugar tiene un aura" />
    <meta name="twitter:description" content="La IA inmobiliaria que verifica el entorno antes de recomendarlo." />
    <meta name="twitter:image" content="https://contexxto.com/og-cover.png" />
    <!-- Rendimiento: conexiones adelantadas (DNS/TLS) + fuentes SIN la cadena @import del CSS
         (el @import obligaba a: descargar CSS → descubrir el import → otra ronda de red antes
         de pintar texto). El <link> aquí arranca la descarga junto con el HTML. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="%VITE_API_URL%" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" />

    <!-- Tema anti-flash: aplica dark/light antes de renderizar -->
    <script>
      try { document.documentElement.setAttribute('data-theme', localStorage.getItem('contexto_theme') === 'light' ? 'light' : 'dark'); } catch (e) {}
    </script>
    <!-- Warm-up del backend (Render se duerme tras inactividad y el primer golpe del día
         tarda 30-60s): este ping lo despierta APENAS carga el HTML, en paralelo a que el
         usuario lee/escribe — cuando envía su primer mensaje, el backend ya va despierto. -->
    <script>
      try { fetch('%VITE_API_URL%/health', { mode: 'cors' }).catch(function () {}) } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
